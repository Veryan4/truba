components:
  schemas:
    LtrParams:
      properties:
        model_name:
          type: string
          default: defaultmodel
        request_handler:
          type: string
          default: query
        params:
          type: array
          items:
            type: object
          default: [{"efi.querytext": "*"}]
        fields:
          type: array
          items:
            type: string
          default: ["*", "score", "[features]"]
    SearchQuery:
      properties:
        terms:
          type: string
          default: "*"
        user_id:
          type: string
        count:
          type: integer
          default: 24
        story_id_list:
          type: array
          items:
            type: string
          default: []
          description: include StoryIds
        not_id_list:
          type: array
          items:
            type: string
          default: []
          description: exclude StoryIds
        language:
          type: array
          items:
            type: string
        start_date:
          type: integer
          default: 1
          description: number of days ago
        end_date:
          type: integer
          default: 0
          description: number of days ago
        source_names:
          type: array
          items:
            type: string
          default: []
        author_names:
          type: array
          items:
            type: string
          default: []
        learn_to_rank_params:
          $ref: '#/components/schemas/LtrParams'
        search_operator:
          type: integer
          default: 0
        grouped:
          type: string
          default: "Source"
        sort:
          type: string
          default: "PublishedAt desc"
    StoryWithFeatures:
      properties:
        story:
          $ref: './Story.yaml#/components/schemas/ShortStory'
        solr_features:
          $ref: './Feature.yaml#/components/schemas/SolrFeatures'
        ranking_features:
          $ref: './Feature.yaml#/components/schemas/RankingFeatures'